---
- hosts: all
  become: true
  tasks:
    - name: Create application user
      user:
        name: "{{app_user}}"
        system: true
        shell: /bin/bash
        home: "/home/{{app_user}}"
        create_home: yes

    - name: Create application directory
      file:
        path: "/home/{{app_user}}/app"
        state: directory
        owner: "{{app_user}}"
        group: "{{app_user}}"
        mode: "0755"
