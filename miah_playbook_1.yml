---
- hosts: all
  become: true
  tasks:
    - name: Create folder
      file:
        path: /etc/myapp
        state: directory
        mode: "0755"
    - name: Copy JSON using jinja2
      template:
        src: templates/config.j2
        dest: /etc/myapp/config.json
        force: true
    - name: install packages
      apt:
        name: "{{ item }}"
        state: latest
      loop:
        - jq
