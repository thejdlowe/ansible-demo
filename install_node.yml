---
- hosts: all
  become: true
  tasks:
    - name: update repository index
      apt:
        update_cache: yes

    - name: install packages
      apt:
        name: "{{ item }}"
        state: latest
      loop:
        - apache2
        - libapache2-mod-php
        - nodejs

    - name: run JD's custom Python script
      my_test:
        name: "hello"
        new: true
      register: jd_response

     - name: Install PM2 globally for process management
      community.general.npm:
        name: pm2
        global: true
        state: present